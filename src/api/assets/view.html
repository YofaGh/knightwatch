<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Knight Watch</title>
    <link rel="stylesheet" href="/view.css" />
  </head>
  <body>
    <header>
      <h1>Knight Watch</h1>
      <span id="status">Loading…</span>
      <button id="shutdown-btn" title="Shut down the server">● Shutdown</button>
    </header>

    <main>
      <div id="screens-pane">
        <div id="screens"></div>
      </div>

      <aside id="process-pane">
        <h2>Process Monitor</h2>
        <div id="process-content">
          <div id="work-banner">✔ Work complete — all children exited</div>

          <div id="root-section">
            <div class="muted">No process tracker running.</div>
          </div>

          <div id="children-section" style="display: none">
            <div class="section-header">
              Children <span class="count-badge" id="children-count">0</span>
            </div>
            <div id="children-list"></div>
          </div>
        </div>
      </aside>
    </main>

    <script src="/view.js" defer></script>
  </body>
</html>
